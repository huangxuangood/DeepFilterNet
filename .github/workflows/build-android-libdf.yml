name: Build Android libdf

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config unzip file

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r28
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;28.0.13004108"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.0.13004108" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/28.0.13004108" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi

      - name: Install cargo-ndk
        run: |
          cargo install cargo-ndk --locked

      - name: Build libdf.so for Android
        env:
          RUSTFLAGS: "-C link-arg=-Wl,-z,max-page-size=16384 -C link-arg=-Wl,-z,common-page-size=16384"
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -o ./android-jniLibs \
            build -p deep_filter --release --no-default-features --features capi

      - name: Check output files
        run: |
          find ./android-jniLibs -name "*.so" -print
          file ./android-jniLibs/arm64-v8a/libdf.so
          file ./android-jniLibs/armeabi-v7a/libdf.so

      - name: Check ELF alignment
        run: |
          echo "=== arm64-v8a ==="
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf -l ./android-jniLibs/arm64-v8a/libdf.so | grep LOAD

          echo "=== armeabi-v7a ==="
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf -l ./android-jniLibs/armeabi-v7a/libdf.so | grep LOAD

      - name: Upload libdf.so
        uses: actions/upload-artifact@v4
        with:
          name: deepfilternet-android-libdf
          path: ./android-jniLibs/**/libdf.so
